name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: genealogy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d genealogy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      POSTGRES_DB: genealogy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run ruff
        run: ruff check backend

      - name: Run Django check
        run: python backend/manage.py check

      - name: Run migrations
        run: python backend/manage.py migrate

      - name: Run tests
        run: python backend/manage.py test apps.accounts apps.genealogy
