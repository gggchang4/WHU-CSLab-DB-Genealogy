<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}族谱系统{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'genealogy:dashboard' %}">寻根溯源</a>
            <div class="d-flex align-items-center gap-3 text-white">
                {% if request.user.is_authenticated %}
                    <span class="small">当前用户：{{ request.user.display_name|default:request.user.username }}</span>
                    <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">退出登录</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'accounts:login' %}">登录</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} mb-2" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
</body>
</html>
